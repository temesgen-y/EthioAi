<svg xmlns="http://www.w3.org/2000/svg" width="120" height="104" viewBox="0 0 120 104">
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(31,122,74,0.8)"/>
      <stop offset="50%" style="stop-color:rgba(56,189,124,0.7)"/>
      <stop offset="100%" style="stop-color:rgba(14,165,164,0.8)"/>
    </linearGradient>
    <pattern id="hexGrid" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 17.3 L60 51.9 L30 69.2 L0 51.9 L0 17.3 Z" fill="none" stroke="url(#hexGradient)" stroke-width="1.2" filter="url(#glow)"/>
      <path d="M60 0 L90 17.3 L90 51.9 L60 69.2 L30 51.9 L30 17.3 Z" fill="none" stroke="url(#hexGradient)" stroke-width="1.2" filter="url(#glow)"/>
      <path d="M15 26 L45 43.3 L45 77.9 L15 95.2 L-15 77.9 L-15 43.3 Z" fill="none" stroke="url(#hexGradient)" stroke-width="1.2" filter="url(#glow)"/>
      <path d="M45 26 L75 43.3 L75 77.9 L45 95.2 L15 77.9 L15 43.3 Z" fill="none" stroke="url(#hexGradient)" stroke-width="1.2" filter="url(#glow)"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#hexGrid)"/>
</svg>
